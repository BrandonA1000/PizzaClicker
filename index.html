<!DOCTYPE html>
<html>
<head>
    <title>Cookie Clicker</title>
</head>

<body style="background-color: white;">

<h1 id="scoreLabel" style="position: absolute; left: 550px; top: 100px;">
    Cookies: 0
</h1>

<button onclick="showAchievements()" 
style="position: absolute; right: 20px; top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer;">
  🏆 Achievements
</button>

<button onclick="cookieClicked()" 
style="position: absolute; left: 650px; top: 200px; width: 100px; height: 100px; 
font-size: 70px; border-radius: 50%;">
  🍪
</button>

<h2 style="position: absolute; left: 340px; top: 300px; color: black;">Click Upgrades</h2>

<button onclick="buyupgrade1()"
style="position: absolute; left: 340px; top: 350px; width: 150px; height: 50px;">
  Upgrade 1 (Cost: 10 Cookies +0.1 clicks)
</button>

<button onclick="buyupgrade2()"
style="position: absolute; left: 340px; top: 400px; width: 150px; height: 50px;">
  Upgrade 2 (Cost: 100 Cookies +1.2 clicks)
</button>

<button onclick="buyupgrade3()"
style="position: absolute; left: 340px; top: 450px; width: 150px; height: 50px;">
  Upgrade 3 (Cost: 250 Cookies +3 clicks)
</button>

<h2 style="position: absolute; left: 1000px; top: 300px; color: black;">Auto Upgrades</h2>

<button onclick="buyGrandma()"
style="position: absolute; left: 1000px; top: 350px; width: 150px; height: 50px;">
  Grandma (Cost: 50 Cookies +0.1/sec)
</button>

<button onclick="buyFarm()"
style="position: absolute; left: 1000px; top: 400px; width: 150px; height: 50px;">
  Farm (Cost: 500 Cookies +1.5/sec)
</button>

<button onclick="buyFactory()"
style="position: absolute; left: 1000px; top: 450px; width: 150px; height: 50px;">
  Factory (Cost: 2000 Cookies +5/sec)
</button>

<script src="script.js"></script>
<link rel="stylesheet" href="style.css">
</body>
</html>
